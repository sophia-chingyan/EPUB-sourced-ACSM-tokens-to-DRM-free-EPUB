<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Denied - ACSM Converter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h2 { font-size: 1.4rem; color: #1c1917; margin-bottom: 0.75rem; }
        .error-msg {
            color: #dc2626;
            background: #fef2f2;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        a {
            display: inline-block;
            padding: 0.7rem 1.5rem;
            background: #1c1917;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }
        a:hover { background: #292524; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🚫</div>
        <h2>Access Denied</h2>
        <div class="error-msg">{{ error }}</div>
        <a href="/login">Try again</a>
    </div>
</body>
</html>
