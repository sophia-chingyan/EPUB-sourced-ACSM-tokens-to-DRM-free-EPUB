<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - ACSM Converter</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        body { background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.10);
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-card .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .login-card h2 { margin-bottom: 0.25rem; }
        .login-card p { color: #78909c; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .error {
            color: #c62828;
            background: #ffebee;
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        input[type="text"] {
            text-align: center;
            font-size: 1.6rem;
            letter-spacing: 0.3em;
            font-weight: 600;
        }
        .hint {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #b0bec5;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon">🔐</div>
        <h2>ACSM Converter</h2>
        <p>Enter the 6-digit code from<br>Google Authenticator</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input
                type="text"
                name="code"
                placeholder="000000"
                inputmode="numeric"
                pattern="[0-9]{6}"
                maxlength="6"
                autocomplete="one-time-code"
                required
                autofocus
            >
            <button type="submit">Verify</button>
        </form>
        <p class="hint">Code refreshes every 30 seconds</p>
    </div>
</body>
</html>
